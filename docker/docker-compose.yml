version: "3.9"

services:
  aihomeassistant:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: aihomeassistant:latest
    container_name: aihomeassistant
    restart: always
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data          # SQLite database persistence
      - ../config:/app/config:ro   # entities.json hot-reload
      - ../audio:/app/audio:ro     # WAV audio feedback files
      - ../logs:/app/logs          # Rolling log files
    devices:
      - /dev/snd:/dev/snd          # ALSA audio device passthrough (Linux only)
